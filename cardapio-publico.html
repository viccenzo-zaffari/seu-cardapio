<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#111110">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Cardápio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --accent: #C8382A;
  --accent-rgb: 200,56,42;
  --bg: #F8F7F4;
  --surface: #FFFFFF;
  --surface2: #F2F0EC;
  --border: #E8E5DF;
  --text: #0F0E0C;
  --text-2: #5C5850;
  --text-3: #9C9890;
  --radius-sm: 8px;
  --radius: 14px;
  --radius-lg: 20px;
}

html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.5; overscroll-behavior: none; }

/* HERO */
.hero { position: relative; min-height: 230px; display: flex; flex-direction: column; justify-content: flex-end; padding: 0 20px 22px; overflow: hidden; background: var(--text); }
.hero-bg-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.15; display: none; }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.88) 0%, rgba(0,0,0,.3) 55%, transparent 100%); }
.hero-content { position: relative; z-index: 2; display: flex; align-items: flex-end; gap: 14px; }
.hero-logo { width: 68px; height: 68px; border-radius: 16px; border: 2px solid rgba(255,255,255,.2); background: rgba(255,255,255,.1); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; overflow: hidden; }
.hero-logo img { width: 100%; height: 100%; object-fit: cover; }
.hero-text { flex: 1; min-width: 0; }
.hero-name { font-family: 'Playfair Display', serif; font-size: 23px; font-weight: 600; color: #fff; line-height: 1.2; margin-bottom: 3px; }
.hero-desc { font-size: 13px; color: rgba(255,255,255,.6); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.hero-pills { position: relative; z-index: 2; display: flex; gap: 7px; flex-wrap: wrap; margin-top: 14px; }
.hero-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; color: rgba(255,255,255,.8); background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15); padding: 4px 10px; border-radius: 100px; cursor: pointer; text-decoration: none; }
.hero-pill:active { background: rgba(255,255,255,.2); }
.pill-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ADE80; }

/* WHATSAPP BAR */
.wa-bar { background: #16A34A; padding: 13px 20px; display: none; align-items: center; justify-content: center; gap: 10px; font-size: 14px; font-weight: 500; color: white; cursor: pointer; }
.wa-bar:active { background: #15803D; }

/* STICKY */
.sticky { position: sticky; top: 0; z-index: 100; background: var(--surface); border-bottom: 1px solid var(--border); }
.search-wrap { padding: 10px 16px 0; }
.search-box { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 100px; padding: 9px 14px; transition: border-color .15s; }
.search-box:focus-within { border-color: var(--accent); }
.search-icon { font-size: 14px; opacity: .4; flex-shrink: 0; }
.search-input { border: none; background: transparent; outline: none; font-family: inherit; font-size: 14px; color: var(--text); flex: 1; min-width: 0; }
.search-input::placeholder { color: var(--text-3); }
.search-clear { font-size: 14px; opacity: .35; cursor: pointer; background: none; border: none; color: var(--text); display: none; padding: 0 2px; }
.search-clear.show { display: block; }

.cat-nav { display: flex; gap: 6px; overflow-x: auto; padding: 10px 16px 12px; scrollbar-width: none; }
.cat-nav::-webkit-scrollbar { display: none; }
.cat-pill { flex-shrink: 0; display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; font-family: inherit; font-size: 13px; font-weight: 500; border-radius: 100px; cursor: pointer; color: var(--text-2); background: var(--surface2); border: 1px solid transparent; transition: all .2s; white-space: nowrap; }
.cat-pill.active { background: var(--accent); color: white; border-color: var(--accent); }

/* CONTENT */
.content { padding: 16px 16px 140px; max-width: 540px; margin: 0 auto; }
.cat-section { margin-bottom: 28px; animation: fadeUp .3s ease both; }
.cat-title { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 600; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1.5px solid var(--border); display: flex; align-items: center; gap: 8px; }
.cat-count { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 400; color: var(--text-3); margin-left: auto; }

/* ITEM CARD */
.item-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; display: flex; gap: 12px; margin-bottom: 8px; cursor: pointer; transition: transform .12s; position: relative; overflow: hidden; -webkit-user-select: none; user-select: none; }
.item-card:active { transform: scale(.982); }
.item-card.unavailable { opacity: .38; pointer-events: none; }
.item-thumb { width: 82px; height: 82px; border-radius: var(--radius-sm); background: var(--surface2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 32px; overflow: hidden; }
.item-thumb img { width: 100%; height: 100%; object-fit: cover; }
.item-body { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: space-between; }
.item-name { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.3; margin-bottom: 3px; }
.item-desc { font-size: 12px; color: var(--text-3); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 8px; }
.item-footer { display: flex; align-items: center; justify-content: space-between; }
.item-price { font-size: 15px; font-weight: 600; color: var(--accent); }
.item-badge { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 100px; background: rgba(var(--accent-rgb),.1); color: var(--accent); }
.unavail-tag { position: absolute; top: 10px; right: 10px; font-size: 9px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; background: var(--surface2); color: var(--text-3); padding: 2px 7px; border-radius: 100px; }

/* SHEET */
.sheet-overlay { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,.5); display: none; align-items: flex-end; }
.sheet-overlay.open { display: flex; }
.sheet { background: var(--surface); border-radius: var(--radius-lg) var(--radius-lg) 0 0; width: 100%; max-height: 88vh; overflow-y: auto; transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1); overscroll-behavior: contain; padding-bottom: max(env(safe-area-inset-bottom), 20px); }
.sheet-overlay.open .sheet { transform: translateY(0); }
.sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }
.sheet-img-wrap { margin: 14px 16px; border-radius: var(--radius); overflow: hidden; background: var(--surface2); height: 200px; display: flex; align-items: center; justify-content: center; font-size: 60px; }
.sheet-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
.sheet-body { padding: 4px 20px 8px; }
.sheet-name { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; line-height: 1.2; margin-bottom: 8px; }
.sheet-desc { font-size: 14px; color: var(--text-2); line-height: 1.65; margin-bottom: 20px; }
.sheet-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 16px; border-top: 1px solid var(--border); }
.sheet-price { font-size: 26px; font-weight: 600; color: var(--accent); }
.sheet-close { padding: 9px 18px; border-radius: 100px; background: var(--surface2); border: 1px solid var(--border); font-family: inherit; font-size: 13px; color: var(--text-2); cursor: pointer; }

/* FAB */
.fab { position: fixed; bottom: max(env(safe-area-inset-bottom,0px) + 20px, 28px); right: 20px; z-index: 200; width: 52px; height: 52px; background: #22C55E; border-radius: 50%; display: none; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(34,197,94,.4); cursor: pointer; font-size: 22px; text-decoration: none; }
.fab.show { display: flex; }
.fab:active { transform: scale(.92); }

/* ESTADOS */
.loading-wrap { display: flex; flex-direction: column; align-items: center; padding: 80px 20px; gap: 14px; color: var(--text-3); }
.spinner { width: 30px; height: 30px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-wrap { text-align: center; padding: 72px 24px; }
.error-emoji { font-size: 48px; margin-bottom: 14px; }
.error-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; margin-bottom: 8px; }
.error-msg { font-size: 14px; color: var(--text-2); }
.no-results { display: none; text-align: center; padding: 36px 20px; color: var(--text-3); }
.no-results.show { display: block; }
.no-results p:first-child { font-size: 15px; font-weight: 500; color: var(--text-2); margin-bottom: 4px; }

/* FOOTER */
.page-footer { text-align: center; padding: 20px 20px 32px; font-size: 12px; color: var(--text-3); }
.footer-brand { font-weight: 600; color: var(--text-2); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.cat-section:nth-child(1){animation-delay:.04s}
.cat-section:nth-child(2){animation-delay:.08s}
.cat-section:nth-child(3){animation-delay:.12s}
.cat-section:nth-child(4){animation-delay:.16s}
.cat-section:nth-child(5){animation-delay:.20s}
</style>
</head>
<body>

<div class="hero" id="hero">
  <img class="hero-bg-img" id="hero-bg-img" alt="">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-logo" id="hero-logo">🍽️</div>
    <div class="hero-text">
      <h1 class="hero-name" id="hero-name">Carregando...</h1>
      <p class="hero-desc" id="hero-desc"></p>
    </div>
  </div>
  <div class="hero-pills" id="hero-pills"></div>
</div>

<div class="wa-bar" id="wa-bar" onclick="openWhatsapp()">
  💬 &nbsp; Falar com o restaurante &nbsp; →
</div>

<div class="sticky">
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="search" id="search-input"
        placeholder="Buscar prato..." autocomplete="off"
        oninput="onSearch(this.value)">
      <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
    </div>
  </div>
  <div class="cat-nav" id="cat-nav"></div>
</div>

<div class="content" id="content">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <span style="font-size:14px">Carregando cardápio...</span>
  </div>
</div>

<footer class="page-footer">
  Cardápio digital por <span class="footer-brand">Seu Cardápio</span>
</footer>

<div class="sheet-overlay" id="sheet-overlay" onclick="handleOverlay(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-img-wrap" id="sheet-img">🍽️</div>
    <div class="sheet-body">
      <div class="sheet-name" id="sheet-name"></div>
      <div class="sheet-desc" id="sheet-desc"></div>
      <div class="sheet-footer">
        <span class="sheet-price" id="sheet-price"></span>
        <button class="sheet-close" onclick="closeSheet()">Fechar ✕</button>
      </div>
    </div>
  </div>
</div>

<div class="fab" id="fab" onclick="openWhatsapp()">💬</div>

<script>
const API = 'https://seu-cardapio-production.up.railway.app/api';
let menuData = null;
let waNumber = null;

function getSlug() {
  const parts = window.location.pathname.split('/').filter(Boolean);
  if (parts[0] === 'cardapio' && parts[1]) return parts[1];
  return new URLSearchParams(window.location.search).get('slug');
}

async function loadMenu() {
  const slug = getSlug();
  if (!slug) { showError('Link inválido', 'Nenhum cardápio encontrado neste endereço.'); return; }
  try {
    const res = await fetch(`${API}/menu/${slug}`);
    if (res.status === 404) { showError('Cardápio não encontrado', `Não existe cardápio com o endereço "${slug}".`); return; }
    if (!res.ok) throw new Error();
    menuData = await res.json();
    render();
    document.querySelectorAll('.cat-section').forEach(s => observer.observe(s));
  } catch {
    showError('Sem conexão', 'Não foi possível carregar. Verifique sua internet.');
  }
}

function render() {
  renderHero();
  renderNav();
  renderContent();
}

function renderHero() {
  const m = menuData;
  document.title = `${m.name} — Cardápio`;

  if (m.primary_color) {
    const hex = m.primary_color.replace('#','');
    const r = parseInt(hex.slice(0,2),16), g = parseInt(hex.slice(2,4),16), b = parseInt(hex.slice(4,6),16);
    document.documentElement.style.setProperty('--accent', m.primary_color);
    document.documentElement.style.setProperty('--accent-rgb', `${r},${g},${b}`);
    document.getElementById('hero').style.background = m.primary_color;
    document.querySelector('meta[name=theme-color]').content = m.primary_color;
  }

  if (m.logo_url) {
    document.getElementById('hero-logo').innerHTML = `<img src="${m.logo_url}" alt="${m.name}">`;
    const bi = document.getElementById('hero-bg-img');
    bi.src = m.logo_url; bi.style.display = 'block';
  }

  document.getElementById('hero-name').textContent = m.name;
  if (m.description) document.getElementById('hero-desc').textContent = m.description;

  const pills = [`<span class="hero-pill"><span class="pill-dot"></span> Aberto agora</span>`];
  if (m.address) pills.push(`<span class="hero-pill">📍 ${m.address}</span>`);
  if (m.whatsapp) {
    waNumber = m.whatsapp.replace(/\D/g,'');
    pills.push(`<span class="hero-pill" onclick="openWhatsapp()">💬 WhatsApp</span>`);
    document.getElementById('wa-bar').style.display = 'flex';
    document.getElementById('fab').classList.add('show');
  }
  document.getElementById('hero-pills').innerHTML = pills.join('');
}

function renderNav() {
  document.getElementById('cat-nav').innerHTML = (menuData.categories||[]).map((c,i) =>
    `<button class="cat-pill ${i===0?'active':''}" onclick="scrollTo('${c.id}',this)">
      ${c.emoji||''}${c.emoji?' ':''}${c.name}
    </button>`
  ).join('');
}

function renderContent() {
  const cats = (menuData.categories||[]).filter(c => c.items.length > 0);
  if (!cats.length) {
    document.getElementById('content').innerHTML = `<div class="error-wrap"><div class="error-emoji">🍽️</div><div class="error-title">Cardápio em breve</div><p class="error-msg">Os pratos estão sendo cadastrados!</p></div>`;
    return;
  }
  document.getElementById('content').innerHTML = cats.map(cat => `
    <section class="cat-section" id="sec-${cat.id}">
      <h2 class="cat-title">
        ${cat.emoji||''}${cat.emoji?' ':''}${cat.name}
        <span class="cat-count">${cat.items.length} ${cat.items.length===1?'item':'itens'}</span>
      </h2>
      ${cat.items.map(renderCard).join('')}
    </section>
  `).join('') + `<div class="no-results" id="no-results"><p>Nenhum resultado</p><p>Tente outro termo de busca</p></div>`;
}

function renderCard(item) {
  const thumb = item.image_url ? `<img src="${item.image_url}" alt="${item.name}" loading="lazy">` : emoji(item.name);
  return `
    <div class="item-card${!item.available?' unavailable':''}" onclick="${item.available?`openSheet('${item.id}')`:''}" role="button">
      ${!item.available?'<span class="unavail-tag">Esgotado</span>':''}
      <div class="item-thumb">${thumb}</div>
      <div class="item-body">
        <div>
          <div class="item-name">${item.name}${item.featured?' ⭐':''}</div>
          ${item.description?`<div class="item-desc">${item.description}</div>`:''}
        </div>
        <div class="item-footer">
          <span class="item-price">R$ ${Number(item.price).toFixed(2).replace('.',',')}</span>
          ${item.featured?'<span class="item-badge">Mais pedido</span>':''}
        </div>
      </div>
    </div>`;
}

function emoji(name) {
  const n = name.toLowerCase();
  if (n.match(/burger|hambur/)) return '🍔';
  if (n.match(/pizza/)) return '🍕';
  if (n.match(/frango|chicken/)) return '🍗';
  if (n.match(/peixe|salmão|camar/)) return '🐟';
  if (n.match(/salada|vegano/)) return '🥗';
  if (n.match(/massa|macarrão|lasanha/)) return '🍝';
  if (n.match(/bolo|torta|cheesecake|brownie/)) return '🍰';
  if (n.match(/sorvete/)) return '🍦';
  if (n.match(/suco|limonada/)) return '🥤';
  if (n.match(/cerveja/)) return '🍺';
  if (n.match(/vinho/)) return '🍷';
  if (n.match(/café|espresso/)) return '☕';
  if (n.match(/açaí/)) return '🫐';
  if (n.match(/churrasco|picanha|carne/)) return '🥩';
  if (n.match(/batata|fritas/)) return '🍟';
  if (n.match(/sushi|temaki/)) return '🍱';
  return '🍽️';
}

function openSheet(itemId) {
  const item = (menuData.categories||[]).flatMap(c=>c.items).find(i=>i.id===itemId);
  if (!item) return;
  const img = document.getElementById('sheet-img');
  img.innerHTML = item.image_url ? `<img src="${item.image_url}" alt="${item.name}">` : emoji(item.name);
  document.getElementById('sheet-name').textContent = item.name;
  document.getElementById('sheet-desc').textContent = item.description || 'Sem descrição disponível.';
  document.getElementById('sheet-price').textContent = `R$ ${Number(item.price).toFixed(2).replace('.',',')}`;
  document.getElementById('sheet-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlay(e) {
  if (e.target === document.getElementById('sheet-overlay')) closeSheet();
}

function onSearch(val) {
  document.getElementById('search-clear').classList.toggle('show', val.length > 0);
  const q = val.toLowerCase().trim();
  let any = false;
  document.querySelectorAll('.cat-section').forEach(sec => {
    let vis = false;
    sec.querySelectorAll('.item-card:not(.unavailable)').forEach(card => {
      const match = !q || card.querySelector('.item-name').textContent.toLowerCase().includes(q)
        || (card.querySelector('.item-desc')||{}).textContent?.toLowerCase().includes(q);
      card.style.display = match ? '' : 'none';
      if (match) { vis = true; any = true; }
    });
    sec.style.display = vis||!q ? '' : 'none';
  });
  const nr = document.getElementById('no-results');
  if (nr) nr.classList.toggle('show', !any && q !== '');
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  onSearch('');
  document.getElementById('search-input').focus();
}

function scrollTo(catId, tab) {
  document.querySelectorAll('.cat-pill').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  const sec = document.getElementById('sec-' + catId);
  if (!sec) return;
  const off = document.querySelector('.sticky').offsetHeight + 8;
  window.scrollTo({ top: sec.offsetTop - off, behavior: 'smooth' });
}

const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (!e.isIntersecting) return;
    const id = e.target.id.replace('sec-','');
    document.querySelectorAll('.cat-pill').forEach(t => {
      const active = t.getAttribute('onclick')?.includes(id);
      t.classList.toggle('active', !!active);
    });
  });
}, { rootMargin: '-40% 0px -50% 0px' });

function openWhatsapp() {
  if (!waNumber) return;
  const msg = encodeURIComponent('Olá! Vi o cardápio de vocês e gostaria de mais informações.');
  window.open(`https://wa.me/55${waNumber}?text=${msg}`, '_blank');
}

function showError(title, msg) {
  document.getElementById('content').innerHTML = `
    <div class="error-wrap">
      <div class="error-emoji">😕</div>
      <div class="error-title">${title}</div>
      <p class="error-msg">${msg}</p>
    </div>`;
}

loadMenu();
</script>
</body>
</html>
