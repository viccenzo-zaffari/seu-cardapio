<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#111110">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Cardápio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --accent: #C8382A; --accent-rgb: 200,56,42;
  --bg: #F8F7F4; --surface: #FFFFFF; --surface2: #F2F0EC;
  --border: #E8E5DF; --text: #0F0E0C; --text-2: #5C5850; --text-3: #9C9890;
  --radius-sm: 8px; --radius: 14px; --radius-lg: 20px;
  --green: #16A34A;
}
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.5; overscroll-behavior: none; }

.hero { position: relative; min-height: 230px; display: flex; flex-direction: column; justify-content: flex-end; padding: 0 20px 22px; overflow: hidden; background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%); }
.hero-bg-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.08; display: none; }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.88) 0%, rgba(0,0,0,.3) 55%, transparent 100%); }
.hero-content { position: relative; z-index: 2; display: flex; align-items: flex-end; gap: 14px; }
.hero-logo { width: 68px; height: 68px; border-radius: 16px; border: 2px solid rgba(255,255,255,.2); background: rgba(255,255,255,.1); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; overflow: hidden; }
.hero-logo img { width: 100%; height: 100%; object-fit: cover; }
.hero-text { flex: 1; min-width: 0; }
.hero-name { font-family: 'Playfair Display', serif; font-size: 23px; font-weight: 600; color: #fff; line-height: 1.2; margin-bottom: 3px; }
.hero-desc { font-size: 13px; color: rgba(255,255,255,.6); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.hero-pills { position: relative; z-index: 2; display: flex; gap: 7px; flex-wrap: wrap; margin-top: 14px; }
.hero-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; color: rgba(255,255,255,.8); background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15); padding: 4px 10px; border-radius: 100px; cursor: pointer; text-decoration: none; }
.pill-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ADE80; }
.pill-dot-red { width: 6px; height: 6px; border-radius: 50%; background: #EF4444; }

.wa-bar { background: #16A34A; padding: 13px 20px; display: none; align-items: center; justify-content: center; gap: 10px; font-size: 14px; font-weight: 500; color: white; cursor: pointer; }
.wa-bar:active { background: #15803D; }

.sticky { position: sticky; top: 0; z-index: 100; background: var(--surface); border-bottom: 1px solid var(--border); }
.search-wrap { padding: 10px 16px 0; }
.search-box { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 100px; padding: 9px 14px; transition: border-color .15s; }
.search-box:focus-within { border-color: var(--accent); }
.search-icon { font-size: 14px; opacity: .4; flex-shrink: 0; }
.search-input { border: none; background: transparent; outline: none; font-family: inherit; font-size: 14px; color: var(--text); flex: 1; min-width: 0; }
.search-input::placeholder { color: var(--text-3); }
.search-clear { font-size: 14px; opacity: .35; cursor: pointer; background: none; border: none; color: var(--text); display: none; padding: 0 2px; }
.search-clear.show { display: block; }
.cat-nav { display: flex; gap: 6px; overflow-x: auto; padding: 10px 16px 12px; scrollbar-width: none; }
.cat-nav::-webkit-scrollbar { display: none; }
.cat-pill { flex-shrink: 0; display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; font-family: inherit; font-size: 13px; font-weight: 500; border-radius: 100px; cursor: pointer; color: var(--text-2); background: var(--surface2); border: 1px solid transparent; transition: all .2s; white-space: nowrap; }
.cat-pill.active { background: var(--accent); color: white; border-color: var(--accent); }

.content { padding: 16px 16px 160px; max-width: 540px; margin: 0 auto; }
.cat-section { margin-bottom: 28px; animation: fadeUp .3s ease both; }
.cat-title { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 600; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1.5px solid var(--border); display: flex; align-items: center; gap: 8px; }
.cat-count { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 400; color: var(--text-3); margin-left: auto; }

/* ITEM CARD */
.item-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; display: flex; gap: 12px; margin-bottom: 8px; cursor: pointer; transition: transform .12s; position: relative; overflow: hidden; -webkit-user-select: none; user-select: none; }
.item-card:active { transform: scale(.982); }
.item-card.unavailable { opacity: .38; pointer-events: none; }
.item-thumb { width: 82px; height: 82px; border-radius: var(--radius-sm); background: var(--surface2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 32px; overflow: hidden; position: relative; }
.item-thumb img { width: 100%; height: 100%; object-fit: cover; }
.item-body { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: space-between; }
.item-name { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.3; margin-bottom: 3px; }
.item-desc { font-size: 12px; color: var(--text-3); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 8px; }
.item-footer { display: flex; align-items: center; justify-content: space-between; }
.item-price { font-size: 15px; font-weight: 600; color: var(--accent); }
.item-badge { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 100px; background: rgba(var(--accent-rgb),.1); color: var(--accent); }
.unavail-tag { position: absolute; top: 10px; right: 10px; font-size: 9px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; background: var(--surface2); color: var(--text-3); padding: 2px 7px; border-radius: 100px; }

/* Botão + no card */
.item-add-btn {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--accent); color: white;
  border: none; font-size: 18px; font-weight: 300;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  transition: transform .15s, opacity .15s;
  line-height: 1;
}
.item-add-btn:active { transform: scale(.88); }

/* Contador no card quando tem itens */
.item-qty-badge {
  position: absolute; top: -4px; right: -4px;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--accent); color: white;
  font-size: 10px; font-weight: 600;
  display: none; align-items: center; justify-content: center;
  border: 2px solid var(--surface);
}
.item-qty-badge.show { display: flex; }

/* SHEET */
.sheet-overlay { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,.5); display: none; align-items: flex-end; }
.sheet-overlay.open { display: flex; }
.sheet { background: var(--surface); border-radius: var(--radius-lg) var(--radius-lg) 0 0; width: 100%; max-height: 88vh; overflow-y: auto; transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1); overscroll-behavior: contain; padding-bottom: max(env(safe-area-inset-bottom), 20px); }
.sheet-overlay.open .sheet { transform: translateY(0); }
.sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }
.sheet-img-wrap { margin: 14px 16px; border-radius: var(--radius); overflow: hidden; background: var(--surface2); height: 200px; display: flex; align-items: center; justify-content: center; font-size: 60px; }
.sheet-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
.sheet-body { padding: 4px 20px 8px; }
.sheet-name { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; line-height: 1.2; margin-bottom: 8px; }
.sheet-desc { font-size: 14px; color: var(--text-2); line-height: 1.65; margin-bottom: 20px; }
.sheet-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 16px; border-top: 1px solid var(--border); gap: 12px; }
.sheet-price { font-size: 24px; font-weight: 600; color: var(--accent); flex-shrink: 0; }

/* Controle de quantidade no sheet */
.qty-control { display: flex; align-items: center; gap: 12px; }
.qty-btn { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--surface2); font-size: 18px; font-weight: 400; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text); transition: all .15s; }
.qty-btn:active { background: var(--border); }
.qty-num { font-size: 16px; font-weight: 600; min-width: 20px; text-align: center; }
.btn-add-cart { flex: 1; padding: 12px; border-radius: 100px; background: var(--accent); color: white; border: none; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity .15s; }
.btn-add-cart:active { opacity: .85; }

/* CARRINHO FAB */
.cart-fab {
  position: fixed; bottom: max(env(safe-area-inset-bottom,0px) + 20px, 28px); left: 20px;
  z-index: 200; background: var(--accent); color: white;
  border-radius: 100px; padding: 12px 20px;
  display: none; align-items: center; gap: 10px;
  box-shadow: 0 4px 20px rgba(var(--accent-rgb),.35);
  cursor: pointer; font-size: 14px; font-weight: 500;
  transition: transform .15s;
}
.cart-fab.show { display: flex; }
.cart-fab:active { transform: scale(.96); }
.cart-fab-count {
  background: white; color: var(--accent);
  border-radius: 100px; padding: 2px 8px;
  font-size: 12px; font-weight: 700;
}

/* WhatsApp FAB */
.fab { position: fixed; bottom: max(env(safe-area-inset-bottom,0px) + 20px, 28px); right: 20px; z-index: 200; width: 52px; height: 52px; background: #22C55E; border-radius: 50%; display: none; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(34,197,94,.4); cursor: pointer; font-size: 22px; text-decoration: none; }
.fab.show { display: flex; }
.fab:active { transform: scale(.92); }

/* CARRINHO SHEET */
.cart-overlay { position: fixed; inset: 0; z-index: 400; background: rgba(0,0,0,.5); display: none; align-items: flex-end; }
.cart-overlay.open { display: flex; }
.cart-sheet { background: var(--surface); border-radius: var(--radius-lg) var(--radius-lg) 0 0; width: 100%; max-height: 90vh; overflow-y: auto; transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1); overscroll-behavior: contain; padding-bottom: max(env(safe-area-inset-bottom), 24px); }
.cart-overlay.open .cart-sheet { transform: translateY(0); }
.cart-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.cart-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; }
.cart-close { width: 32px; height: 32px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; color: var(--text-2); }
.cart-items { padding: 12px 20px; display: flex; flex-direction: column; gap: 12px; }
.cart-item { display: flex; align-items: center; gap: 12px; }
.cart-item-thumb { width: 48px; height: 48px; border-radius: var(--radius-sm); background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; overflow: hidden; }
.cart-item-thumb img { width: 100%; height: 100%; object-fit: cover; }
.cart-item-info { flex: 1; min-width: 0; }
.cart-item-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
.cart-item-price { font-size: 12px; color: var(--accent); font-weight: 600; }
.cart-item-qty { display: flex; align-items: center; gap: 8px; }
.cart-qty-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface2); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text); }
.cart-qty-btn:active { background: var(--border); }
.cart-qty-num { font-size: 14px; font-weight: 600; min-width: 18px; text-align: center; }

.cart-empty { text-align: center; padding: 48px 20px; color: var(--text-3); }
.cart-empty-icon { font-size: 40px; margin-bottom: 12px; }

.cart-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
.cart-total { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.cart-total-label { font-size: 15px; font-weight: 500; }
.cart-total-value { font-size: 20px; font-weight: 700; color: var(--accent); }
.cart-actions { display: flex; flex-direction: column; gap: 10px; }
.btn-cart-wa { width: 100%; padding: 14px; border-radius: 100px; background: #22C55E; color: white; border: none; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-cart-wa:active { opacity: .85; }
.btn-cart-garcom { width: 100%; padding: 14px; border-radius: 100px; background: var(--accent); color: white; border: none; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-cart-garcom:active { opacity: .85; }
.btn-cart-clear { width: 100%; padding: 10px; border-radius: 100px; background: transparent; color: var(--text-3); border: 1px solid var(--border); font-family: inherit; font-size: 13px; cursor: pointer; }

/* ESTADOS */
.loading-wrap { display: flex; flex-direction: column; align-items: center; padding: 80px 20px; gap: 14px; color: var(--text-3); }
.spinner { width: 30px; height: 30px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-wrap { text-align: center; padding: 72px 24px; }
.error-emoji { font-size: 48px; margin-bottom: 14px; }
.error-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; margin-bottom: 8px; }
.error-msg { font-size: 14px; color: var(--text-2); }
.no-results { display: none; text-align: center; padding: 36px 20px; color: var(--text-3); }
.no-results.show { display: block; }
.no-results p:first-child { font-size: 15px; font-weight: 500; color: var(--text-2); margin-bottom: 4px; }
.page-footer { text-align: center; padding: 20px 20px 32px; font-size: 12px; color: var(--text-3); }
.footer-brand { font-weight: 600; color: var(--text-2); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.cat-section:nth-child(1){animation-delay:.04s} .cat-section:nth-child(2){animation-delay:.08s}
.cat-section:nth-child(3){animation-delay:.12s} .cat-section:nth-child(4){animation-delay:.16s}
.cat-section:nth-child(5){animation-delay:.20s}
</style>
</head>
<body>

<div class="hero" id="hero">
  <img class="hero-bg-img" id="hero-bg-img" alt="">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-logo" id="hero-logo">🍽️</div>
    <div class="hero-text">
      <h1 class="hero-name" id="hero-name">Carregando...</h1>
      <p class="hero-desc" id="hero-desc"></p>
    </div>
  </div>
  <div class="hero-pills" id="hero-pills"></div>
</div>

<div class="wa-bar" id="wa-bar" onclick="openWhatsapp()">
  💬 &nbsp; Falar com o restaurante &nbsp; →
</div>

<div class="sticky">
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="search" id="search-input" placeholder="Buscar prato..." autocomplete="off" oninput="onSearch(this.value)">
      <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
    </div>
  </div>
  <div class="cat-nav" id="cat-nav"></div>
</div>

<div class="content" id="content">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <span style="font-size:14px">Carregando cardápio...</span>
  </div>
</div>

<footer class="page-footer">
  Cardápio digital por <span class="footer-brand">Seu Cardápio</span>
</footer>

<!-- Sheet detalhes do prato -->
<div class="sheet-overlay" id="sheet-overlay" onclick="handleOverlay(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-img-wrap" id="sheet-img">🍽️</div>
    <div class="sheet-body">
      <div class="sheet-name" id="sheet-name"></div>
      <div class="sheet-desc" id="sheet-desc"></div>
      <div class="sheet-footer">
        <span class="sheet-price" id="sheet-price"></span>
        <div class="qty-control">
          <button class="qty-btn" onclick="changeSheetQty(-1)">−</button>
          <span class="qty-num" id="sheet-qty">1</span>
          <button class="qty-btn" onclick="changeSheetQty(1)">+</button>
        </div>
        <button class="btn-add-cart" onclick="addToCartFromSheet()">Adicionar</button>
      </div>
    </div>
  </div>
</div>

<!-- FAB carrinho -->
<div class="cart-fab" id="cart-fab" onclick="openCart()">
  🛒 Ver carrinho
  <span class="cart-fab-count" id="cart-fab-count">0</span>
</div>

<!-- FAB WhatsApp -->
<div class="fab" id="fab" onclick="openWhatsapp()">💬</div>

<!-- Sheet carrinho -->
<div class="cart-overlay" id="cart-overlay" onclick="handleCartOverlay(event)">
  <div class="cart-sheet">
    <div class="cart-header">
      <span class="cart-title">Meu pedido</span>
      <button class="cart-close" onclick="closeCart()">✕</button>
    </div>
    <div id="cart-body"></div>
    <div class="cart-footer" id="cart-footer" style="display:none">
      <div class="cart-total">
        <span class="cart-total-label">Total</span>
        <span class="cart-total-value" id="cart-total">R$ 0,00</span>
      </div>
      <div class="cart-actions">
        <button class="btn-cart-wa" onclick="sendCartWhatsapp()">💬 Enviar pedido pelo WhatsApp</button>
        <button class="btn-cart-garcom" onclick="callGarcom()">🔔 Chamar o garçom</button>
        <button class="btn-cart-clear" onclick="clearCart()">Limpar carrinho</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'https://seu-cardapio-production.up.railway.app/api';
let menuData = null;
let waNumber = null;
let currentSheetItem = null;
let sheetQty = 1;

// ── CARRINHO ──────────────────────────────────────────
let cart = []; // [{item, qty}]

function getCartTotal() {
  return cart.reduce((sum, e) => sum + Number(e.item.price) * e.qty, 0);
}

function getCartCount() {
  return cart.reduce((sum, e) => sum + e.qty, 0);
}

function updateCartFab() {
  const count = getCartCount();
  const fab = document.getElementById('cart-fab');
  const countEl = document.getElementById('cart-fab-count');
  countEl.textContent = count;
  fab.classList.toggle('show', count > 0);
}

function addToCart(item, qty = 1) {
  const existing = cart.find(e => e.item.id === item.id);
  if (existing) {
    existing.qty += qty;
  } else {
    cart.push({ item, qty });
  }
  updateCartFab();
  updateItemBadges();
}

function removeFromCart(itemId, qty = 1) {
  const existing = cart.find(e => e.item.id === itemId);
  if (!existing) return;
  existing.qty -= qty;
  if (existing.qty <= 0) cart = cart.filter(e => e.item.id !== itemId);
  updateCartFab();
  updateItemBadges();
}

function updateItemBadges() {
  cart.forEach(e => {
    const badge = document.getElementById(`qty-badge-${e.item.id}`);
    if (badge) { badge.textContent = e.qty; badge.classList.add('show'); }
  });
  // Zera badges de itens removidos
  document.querySelectorAll('.item-qty-badge').forEach(badge => {
    const id = badge.id.replace('qty-badge-', '');
    const inCart = cart.find(e => e.item.id === id);
    if (!inCart) { badge.classList.remove('show'); badge.textContent = '0'; }
  });
}

function clearCart() {
  cart = [];
  updateCartFab();
  updateItemBadges();
  renderCart();
}

function openCart() {
  renderCart();
  document.getElementById('cart-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleCartOverlay(e) {
  if (e.target === document.getElementById('cart-overlay')) closeCart();
}

function renderCart() {
  const body = document.getElementById('cart-body');
  const footer = document.getElementById('cart-footer');
  const total = document.getElementById('cart-total');

  if (!cart.length) {
    body.innerHTML = `<div class="cart-empty"><div class="cart-empty-icon">🛒</div><p style="font-weight:500;color:var(--text-2)">Carrinho vazio</p><p style="font-size:13px;margin-top:4px">Adicione itens do cardápio</p></div>`;
    footer.style.display = 'none';
    return;
  }

  body.innerHTML = `<div class="cart-items">${cart.map(e => `
    <div class="cart-item">
      <div class="cart-item-thumb">${e.item.image_url ? `<img src="${e.item.image_url}" alt="${e.item.name}">` : emoji(e.item.name)}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${e.item.name}</div>
        <div class="cart-item-price">R$ ${(Number(e.item.price) * e.qty).toFixed(2).replace('.',',')}</div>
      </div>
      <div class="cart-item-qty">
        <button class="cart-qty-btn" onclick="removeFromCart('${e.item.id}');renderCart()">−</button>
        <span class="cart-qty-num">${e.qty}</span>
        <button class="cart-qty-btn" onclick="addToCart(${JSON.stringify(e.item).replace(/"/g,"'")});renderCart()">+</button>
      </div>
    </div>
  `).join('')}</div>`;

  total.textContent = `R$ ${getCartTotal().toFixed(2).replace('.',',')}`;
  footer.style.display = 'block';
}

function sendCartWhatsapp() {
  if (!waNumber || !cart.length) return;
  const lines = cart.map(e => `${e.qty}x ${e.item.name} — R$ ${(Number(e.item.price)*e.qty).toFixed(2).replace('.',',')}`);
  const total = `\n*Total: R$ ${getCartTotal().toFixed(2).replace('.',',')}*`;
  const msg = `Olá! Gostaria de fazer o seguinte pedido:\n\n${lines.join('\n')}${total}`;
  window.open(`https://wa.me/55${waNumber}?text=${encodeURIComponent(msg)}`, '_blank');
}

function callGarcom() {
  if (!cart.length) return;
  const lines = cart.map(e => `${e.qty}x ${e.item.name}`);
  alert(`✅ Pedido anotado!\n\n${lines.join('\n')}\n\nTotal: R$ ${getCartTotal().toFixed(2).replace('.',',')}\n\nUm garçom virá até você em breve.`);
  closeCart();
}

// ── SHEET QTY ─────────────────────────────────────────
function changeSheetQty(delta) {
  sheetQty = Math.max(1, sheetQty + delta);
  document.getElementById('sheet-qty').textContent = sheetQty;
}

function addToCartFromSheet() {
  if (!currentSheetItem) return;
  addToCart(currentSheetItem, sheetQty);
  closeSheet();
  showToastMsg(`${sheetQty}x ${currentSheetItem.name} adicionado!`);
}

// ── TOAST ─────────────────────────────────────────────
function showToastMsg(msg) {
  let t = document.getElementById('toast-msg');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast-msg';
    t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#0F0E0C;color:white;padding:10px 18px;border-radius:100px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:500;white-space:nowrap;pointer-events:none';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(20px)'; }, 2200);
}

// ── SLUG ──────────────────────────────────────────────
function getSlug() {
  const parts = window.location.pathname.split('/').filter(Boolean);
  if (parts[0] === 'cardapio' && parts[1]) return parts[1];
  return new URLSearchParams(window.location.search).get('slug');
}

// ── HORÁRIOS ──────────────────────────────────────────
function isOpenNow(openingHours) {
  if (!openingHours) return null;
  let hours = {};
  try { hours = JSON.parse(openingHours); } catch { return null; }
  if (!Object.keys(hours).length) return null;
  const now = new Date();
  const dayMap = { 0:'dom',1:'seg',2:'ter',3:'qua',4:'qui',5:'sex',6:'sab' };
  const today = hours[dayMap[now.getDay()]];
  if (!today || !today.open) return false;
  const [fH,fM] = today.from.split(':').map(Number);
  const [tH,tM] = today.to.split(':').map(Number);
  const nowMin = now.getHours()*60+now.getMinutes();
  return nowMin >= fH*60+fM && nowMin <= tH*60+tM;
}

function getTodayHours(openingHours) {
  if (!openingHours) return null;
  let hours = {};
  try { hours = JSON.parse(openingHours); } catch { return null; }
  const dayMap = { 0:'dom',1:'seg',2:'ter',3:'qua',4:'qui',5:'sex',6:'sab' };
  const today = hours[dayMap[new Date().getDay()]];
  if (!today || !today.open) return null;
  return { from: today.from, to: today.to };
}

function getStatusPill(openingHours) {
  const open = isOpenNow(openingHours);
  const todayH = getTodayHours(openingHours);
  if (open === null) return `<span class="hero-pill"><span class="pill-dot"></span> Aberto agora</span>`;
  if (open) return `<span class="hero-pill"><span class="pill-dot"></span> Aberto${todayH ? ` · fecha às ${todayH.to}` : ''}</span>`;
  return `<span class="hero-pill" style="border-color:rgba(239,68,68,.3)"><span class="pill-dot-red"></span> ${todayH ? `Fechado · abre às ${todayH.from}` : 'Fechado hoje'}</span>`;
}

// ── LOAD ──────────────────────────────────────────────
async function loadMenu() {
  const slug = getSlug();
  if (!slug) { showError('Link inválido', 'Nenhum cardápio encontrado neste endereço.'); return; }
  try {
    const res = await fetch(`${API}/menu/${slug}`);
    if (res.status === 404) { showError('Cardápio não encontrado', `Não existe cardápio com o endereço "${slug}".`); return; }
    if (!res.ok) throw new Error();
    menuData = await res.json();
    render();
    document.querySelectorAll('.cat-section').forEach(s => observer.observe(s));
  } catch { showError('Sem conexão', 'Não foi possível carregar. Verifique sua internet.'); }
}

function render() { renderHero(); renderNav(); renderContent(); }

function renderHero() {
  const m = menuData;
  document.title = `${m.name} — Cardápio`;
  if (m.primary_color) {
    const hex = m.primary_color.replace('#','');
    const r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
    document.documentElement.style.setProperty('--accent', m.primary_color);
    document.documentElement.style.setProperty('--accent-rgb', `${r},${g},${b}`);
    document.querySelector('meta[name=theme-color]').content = m.primary_color;
  }
  if (m.logo_url) {
    document.getElementById('hero-logo').innerHTML = `<img src="${m.logo_url}" alt="${m.name}">`;
    const bi = document.getElementById('hero-bg-img');
    bi.src = m.logo_url; bi.style.display = 'block'; bi.style.opacity = '0.08';
  }
  document.getElementById('hero-name').textContent = m.name;
  if (m.description) document.getElementById('hero-desc').textContent = m.description;
  const pills = [getStatusPill(m.opening_hours)];
  if (m.address) pills.push(`<span class="hero-pill">📍 ${m.address}</span>`);
  if (m.whatsapp) {
    waNumber = m.whatsapp.replace(/\D/g,'');
    pills.push(`<span class="hero-pill" onclick="openWhatsapp()">💬 WhatsApp</span>`);
    document.getElementById('wa-bar').style.display = 'flex';
    document.getElementById('fab').classList.add('show');
  }
  document.getElementById('hero-pills').innerHTML = pills.join('');
}

function renderNav() {
  document.getElementById('cat-nav').innerHTML = (menuData.categories||[]).map((c,i) =>
    `<button class="cat-pill ${i===0?'active':''}" onclick="scrollToCategory('${c.id}',this)">${c.emoji||''}${c.emoji?' ':''}${c.name}</button>`
  ).join('');
}

function renderContent() {
  const cats = (menuData.categories||[]).filter(c => c.items.length > 0);
  if (!cats.length) {
    document.getElementById('content').innerHTML = `<div class="error-wrap"><div class="error-emoji">🍽️</div><div class="error-title">Cardápio em breve</div><p class="error-msg">Os pratos estão sendo cadastrados!</p></div>`;
    return;
  }
  document.getElementById('content').innerHTML = cats.map(cat => `
    <section class="cat-section" id="sec-${cat.id}">
      <h2 class="cat-title">${cat.emoji||''}${cat.emoji?' ':''}${cat.name}<span class="cat-count">${cat.items.length} ${cat.items.length===1?'item':'itens'}</span></h2>
      ${cat.items.map(renderCard).join('')}
    </section>
  `).join('') + `<div class="no-results" id="no-results"><p>Nenhum resultado</p><p>Tente outro termo de busca</p></div>`;
}

function renderCard(item) {
  const thumb = item.image_url ? `<img src="${item.image_url}" alt="${item.name}" loading="lazy">` : emoji(item.name);
  return `
    <div class="item-card${!item.available?' unavailable':''}" role="button">
      ${!item.available?'<span class="unavail-tag">Esgotado</span>':''}
      <div class="item-thumb" onclick="${item.available?`openSheet('${item.id}`)`:''}">${thumb}
        <span class="item-qty-badge" id="qty-badge-${item.id}">0</span>
      </div>
      <div class="item-body" onclick="${item.available?`openSheet('${item.id}`)``:''}">
        <div>
          <div class="item-name">${item.name}${item.featured?' ⭐':''}</div>
          ${item.description?`<div class="item-desc">${item.description.replace(/\n/g,'<br>')}</div>`:''}
        </div>
        <div class="item-footer">
          <span class="item-price">R$ ${Number(item.price).toFixed(2).replace('.',',')}</span>
          ${item.featured?'<span class="item-badge">Mais pedido</span>':''}
        </div>
      </div>
      ${item.available?`<button class="item-add-btn" onclick="quickAdd(event,'${item.id}')">+</button>`:''}
    </div>`;
}

function quickAdd(event, itemId) {
  event.stopPropagation();
  const item = (menuData.categories||[]).flatMap(c=>c.items).find(i=>i.id===itemId);
  if (!item) return;
  addToCart(item, 1);
  showToastMsg(`${item.name} adicionado!`);
}

function emoji(name) {
  const n = name.toLowerCase();
  if (n.match(/burger|hambur/)) return '🍔';
  if (n.match(/pizza/)) return '🍕';
  if (n.match(/frango|chicken/)) return '🍗';
  if (n.match(/peixe|salmão|camar/)) return '🐟';
  if (n.match(/salada|vegano/)) return '🥗';
  if (n.match(/massa|macarrão|lasanha/)) return '🍝';
  if (n.match(/bolo|torta|cheesecake|brownie/)) return '🍰';
  if (n.match(/sorvete/)) return '🍦';
  if (n.match(/suco|limonada/)) return '🥤';
  if (n.match(/cerveja/)) return '🍺';
  if (n.match(/vinho/)) return '🍷';
  if (n.match(/café|espresso/)) return '☕';
  if (n.match(/açaí/)) return '🫐';
  if (n.match(/churrasco|picanha|carne/)) return '🥩';
  if (n.match(/batata|fritas/)) return '🍟';
  if (n.match(/sushi|temaki/)) return '🍱';
  return '🍽️';
}

function openSheet(itemId) {
  const item = (menuData.categories||[]).flatMap(c=>c.items).find(i=>i.id===itemId);
  if (!item) return;
  currentSheetItem = item;
  sheetQty = 1;
  document.getElementById('sheet-qty').textContent = '1';
  const img = document.getElementById('sheet-img');
  img.innerHTML = item.image_url ? `<img src="${item.image_url}" alt="${item.name}">` : emoji(item.name);
  document.getElementById('sheet-name').textContent = item.name;
  document.getElementById('sheet-desc').innerHTML = (item.description || 'Sem descrição disponível.').replace(/\n/g,'<br>');
  document.getElementById('sheet-price').textContent = `R$ ${Number(item.price).toFixed(2).replace('.',',')}`;
  document.getElementById('sheet-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.body.style.overflow = '';
  currentSheetItem = null;
}

function handleOverlay(e) {
  if (e.target === document.getElementById('sheet-overlay')) closeSheet();
}

function onSearch(val) {
  document.getElementById('search-clear').classList.toggle('show', val.length > 0);
  const q = val.toLowerCase().trim();
  let any = false;
  document.querySelectorAll('.cat-section').forEach(sec => {
    let vis = false;
    sec.querySelectorAll('.item-card:not(.unavailable)').forEach(card => {
      const match = !q || card.querySelector('.item-name').textContent.toLowerCase().includes(q)
        || (card.querySelector('.item-desc')||{}).textContent?.toLowerCase().includes(q);
      card.style.display = match ? '' : 'none';
      if (match) { vis = true; any = true; }
    });
    sec.style.display = vis||!q ? '' : 'none';
  });
  const nr = document.getElementById('no-results');
  if (nr) nr.classList.toggle('show', !any && q !== '');
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  onSearch('');
  document.getElementById('search-input').focus();
}

function scrollToCategory(catId, tab) {
  document.querySelectorAll('.cat-pill').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  const sec = document.getElementById('sec-' + catId);
  if (!sec) return;
  const off = document.querySelector('.sticky').offsetHeight + 8;
  window.scrollTo({ top: sec.offsetTop - off, behavior: 'smooth' });
}

const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (!e.isIntersecting) return;
    const id = e.target.id.replace('sec-','');
    document.querySelectorAll('.cat-pill').forEach(t => {
      t.classList.toggle('active', !!t.getAttribute('onclick')?.includes(id));
    });
  });
}, { rootMargin: '-40% 0px -50% 0px' });

function openWhatsapp() {
  if (!waNumber) return;
  const msg = encodeURIComponent('Olá! Vi o cardápio de vocês e gostaria de mais informações.');
  window.open(`https://wa.me/55${waNumber}?text=${msg}`, '_blank');
}

function showError(title, msg) {
  document.getElementById('content').innerHTML = `<div class="error-wrap"><div class="error-emoji">😕</div><div class="error-title">${title}</div><p class="error-msg">${msg}</p></div>`;
}

loadMenu();
</script>
